name: publish-platform-secrets

on:
  push:
    tags:
      - 'platform-secrets-v*'
  workflow_dispatch:

# Publishes @useauthio/platform-secrets from packages/platform-secrets.
# Tag example: platform-secrets-v0.1.0
#
# AUTH — org-level NPM_TOKEN (same as publish.yml / authio_nextjs).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
        working-directory: packages/platform-secrets
      - name: Test
        run: pnpm test
        working-directory: packages/platform-secrets
      - name: Require npm publish credentials
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is required to publish platform-secrets"
            exit 1
          fi
      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/platform-secrets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
