name: publish

on:
  push:
    tags:
      - 'v*'

# Fully automated npm publishing. Pushing a git tag like `v0.2.0` builds,
# tests, and publishes this package to npm under the @useauthio scope.
#
# AUTH — org-level token:
# `NODE_AUTH_TOKEN` reads `secrets.NPM_TOKEN`, which is expected to be a
# single ORGANIZATION-level GitHub Actions secret shared by every
# authio-com repo (Settings → Secrets and variables → Actions → New
# organization secret). GitHub Actions cannot reference `secrets.*` inside
# an `if:`, so the token is hoisted to job-level `env` and the publish step
# is gated on `env.NPM_TOKEN != ''`. Build + test always run, so the
# workflow stays GREEN even before the secret exists; only the publish step
# skips. The same token publishes the FIRST (never-before-seen) version of a
# package, as long as the token's scope covers the @useauthio org.
#
# `--provenance` attaches a signed build-provenance attestation for
# supply-chain transparency (npm shows a verified "Built and signed on
# GitHub Actions" badge). It requires `id-token: write` (below) + a public
# repo.
#
# ALTERNATIVE — npm Trusted Publishing (OIDC, tokenless):
# npm supports keyless publishing via OIDC. To adopt it later, per package on
# npmjs.com go to Settings → Trusted Publisher → GitHub Actions and register
# repo `authio-com/<repo>` + workflow `publish.yml`. Then you can delete
# NPM_TOKEN and the env/gating and keep only `id-token: write` +
# `--provenance`. Until that's configured, the org-token path below is the
# active mechanism.
permissions:
  contents: read
  id-token: write

jobs:
  # CONFORMANCE GATE — a RED conformance run blocks this version's publish.
  #
  # Before npm publish, dispatch the cross-repo conformance matrix in
  # authio_e2e-tests (the headless SDK matrix + OpenAPI contract checks that
  # exercise THIS published SDK against the LIVE services) and block the
  # release if it concludes failure. `publish` `needs` this job, so a red
  # matrix means no publish.
  #
  # INFRA-ABSENT, DON'T-BRICK-RELEASES DESIGN: the cross-repo dispatch needs a
  # PAT with actions:read+write on authio_e2e-tests, stored as the org/repo
  # secret CONFORMANCE_DISPATCH_TOKEN. When that secret is ABSENT (infra not
  # yet wired) the gate emits a notice and PASSES, so releases aren't bricked
  # before an operator wires it. Once present, the gate is enforced on every
  # release. The conformance suite itself stays green when its own
  # CONFORMANCE_* live secrets are absent (it skips, not fails), so the gate
  # only ever goes RED on a genuine conformance regression.
  conformance-gate:
    name: Conformance gate (authio_e2e-tests)
    runs-on: ubuntu-latest
    steps:
      - name: Require a green conformance run before publishing
        env:
          GH_TOKEN: ${{ secrets.CONFORMANCE_DISPATCH_TOKEN }}
          CONF_REPO: Authio-com/authio_e2e-tests
          CONF_WORKFLOW: conformance.yml
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::CONFORMANCE_DISPATCH_TOKEN absent — conformance gate skipped (infra not wired). Set it (a PAT with actions:read+write on ${CONF_REPO}) to enforce a green conformance run before publish."
            exit 0
          fi
          echo "Dispatching conformance matrix on ${CONF_REPO} (${CONF_WORKFLOW})…"
          before=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run "${CONF_WORKFLOW}" --repo "${CONF_REPO}" --ref main
          run_id=""
          for _ in $(seq 1 30); do
            sleep 6
            run_id=$(gh run list --repo "${CONF_REPO}" --workflow "${CONF_WORKFLOW}" \
              --event workflow_dispatch --limit 1 \
              --json databaseId,createdAt \
              -q "[.[] | select(.createdAt >= \"${before}\")][0].databaseId" || true)
            if [ -n "${run_id}" ] && [ "${run_id}" != "null" ]; then break; fi
          done
          if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
            echo "::error::Could not locate the dispatched conformance run on ${CONF_REPO}."
            exit 1
          fi
          echo "Watching conformance run ${run_id} (a red run blocks publish)…"
          gh run watch "${run_id}" --repo "${CONF_REPO}" --exit-status

  publish:
    needs: [conformance-gate]
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - name: Test (if a test script exists)
        run: |
          if node -e "process.exit(Object.keys(require('./package.json').scripts||{}).includes('test')?0:1)"; then
            pnpm test
          else
            echo "no \"test\" script in package.json; skipping"
          fi
      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Skip publish (no NPM_TOKEN secret)
        if: env.NPM_TOKEN == ''
        run: |
          echo "::notice::NPM_TOKEN secret is not set; skipping publish step."
          echo "Add an org-level NPM_TOKEN (Settings → Secrets and variables → Actions → org secret), then re-tag to release."
